id: /subscriptions/a92bfee7-ad40-4b5f-83cd-db3ca90504d8/resourceGroups/test/providers/Microsoft.OperationalInsights/workspaces/test-workspace/providers/Microsoft.SecurityInsights/alertRules/49cc2e68-4ebb-4285-9419-2518bc2a1c7a
name: 49cc2e68-4ebb-4285-9419-2518bc2a1c7a
type: Microsoft.SecurityInsights/alertRules
etag: '"eb04a51d-0000-0100-0000-687669360000"'
kind: Scheduled
query: |
  let procList = externaldata(Process:string) [@"https://raw.githubusercontent.com/Azure/Azure-Sentinel/master/Sample%20Data/Microsoft_Lolbas_Execution_Binaries.csv"] with (format="csv", ignoreFirstRecord=True);
  Event
  | where EventLog =~ "Microsoft-Windows-Sysmon/Operational" and EventID==1
  | parse EventData with * 'Image">' Image "<" * 'OriginalFileName">' OriginalFileName "<" *
  | where OriginalFileName has_any (procList) and not (Image has_any (procList))
  | parse EventData with * 'ProcessGuid">' ProcessGuid "<" * 'Description">' Description "<" * 'CommandLine">' CommandLine "<" * 'CurrentDirectory">' CurrentDirectory "<" * 'User">' User "<" * 'LogonGuid">' LogonGuid "<" * 'Hashes">' Hashes "<" * 'ParentProcessGuid">' ParentProcessGuid "<" * 'ParentImage">' ParentImage "<" * 'ParentCommandLine">' ParentCommandLine "<" * 'ParentUser">' ParentUser "<" *
  | summarize StartTime = min(TimeGenerated), EndTime = max(TimeGenerated) by EventID, Computer, User, ParentImage, ParentProcessGuid, ParentCommandLine, ParentUser, Image, ProcessGuid, CommandLine, Description, OriginalFileName, CurrentDirectory, Hashes
  | extend HostName = iif(Computer has '.',substring(Computer,0,indexof(Computer,'.')),Computer) , DnsDomain = iif(Computer has '.',substring(Computer,indexof(Computer,'.')+1),'')
query_frequency: PT1H
query_period: PT1H
severity: Medium
trigger_operator: GreaterThan
trigger_threshold: 0
event_grouping_settings:
  aggregation_kind: SingleAlert
entity_mappings:
- entity_type: Process
  field_mappings:
  - identifier: CommandLine
    column_name: CommandLine
- entity_type: Host
  field_mappings:
  - identifier: FullName
    column_name: Computer
  - identifier: HostName
    column_name: HostName
  - identifier: DnsDomain
    column_name: DnsDomain
- entity_type: Account
  field_mappings:
  - identifier: Name
    column_name: User
alert_rule_template_name: cbf6ad48-fa5c-4bf7-b205-28dbadb91255
template_version: 1.0.3
description: "This query detects the execution of renamed Windows binaries (Lolbins).\
  \ This is a common technique used by adversaries to evade detection. \nRef: https://docs.paloaltonetworks.com/cortex/cortex-xdr/cortex-xdr-analytics-alert-reference/cortex-xdr-analytics-alert-reference/execution-of-renamed-lolbin.html"
display_name: Windows Binaries Lolbins Renamed
enabled: true
last_modified_utc: '2025-07-15T14:43:55.235181Z'
suppression_duration: PT1H
suppression_enabled: false
tactics:
- Execution
incident_configuration:
  create_incident: true
  grouping_configuration:
    enabled: false
    reopen_closed_incident: false
    lookback_duration: PT5H
    matching_method: AllEntities
    group_by_entities: []
    group_by_alert_details: []
    group_by_custom_details: []
