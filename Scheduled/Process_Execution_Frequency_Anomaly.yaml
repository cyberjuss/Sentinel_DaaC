id: /subscriptions/a92bfee7-ad40-4b5f-83cd-db3ca90504d8/resourceGroups/test/providers/Microsoft.OperationalInsights/workspaces/test-workspace/providers/Microsoft.SecurityInsights/alertRules/33ee7ca0-531b-45dc-a7fb-297730fc50a6
name: 33ee7ca0-531b-45dc-a7fb-297730fc50a6
type: Microsoft.SecurityInsights/alertRules
etag: '"eb04fd1c-0000-0100-0000-6876692f0000"'
kind: Scheduled
query: "let starttime = 14d;\nlet endtime = 1d;\nlet timeframe = 1h;\nlet TotalEventsThreshold\
  \ = 5;\n// Configure the list with sensitive process names \nlet ExeList = dynamic([\"\
  powershell.exe\",\"cmd.exe\",\"wmic.exe\",\"psexec.exe\",\"cacls.exe\",\"rundll32.exe\"\
  ]);\nlet TimeSeriesData =\nSecurityEvent\n| where EventID == 4688 | extend Process\
  \ = tolower(Process)\n| where TimeGenerated between (startofday(ago(starttime))..startofday(ago(endtime)))\n\
  | where Process in~ (ExeList)\n| project TimeGenerated, Computer, AccountType, Account,\
  \ Process\n| make-series Total=count() on TimeGenerated from startofday(ago(starttime))\
  \ to startofday(ago(endtime)) step timeframe by Process;\nlet TimeSeriesAlerts =\
  \ materialize(TimeSeriesData\n| extend (anomalies, score, baseline) = series_decompose_anomalies(Total,\
  \ 1.5, -1, 'linefit')\n| mv-expand Total to typeof(double), TimeGenerated to typeof(datetime),\
  \ anomalies to typeof(double), score to typeof(double), baseline to typeof(long)\n\
  | where anomalies > 0\n| project Process, TimeGenerated, Total, baseline, anomalies,\
  \ score\n| where Total > TotalEventsThreshold);\nlet AnomalyHours = materialize(TimeSeriesAlerts\
  \  | where TimeGenerated > ago(2d) | project TimeGenerated);\nTimeSeriesAlerts\n\
  | where TimeGenerated > ago(2d)\n| join (\nSecurityEvent\n| where TimeGenerated\
  \ between (startofday(ago(starttime))..startofday(ago(endtime)))\n| extend DateHour\
  \ = bin(TimeGenerated, 1h) // create a new column and round to hour\n| where DateHour\
  \ in ((AnomalyHours)) //filter the dataset to only selected anomaly hours\n| where\
  \ EventID == 4688 | extend Process = tolower(Process)\n| summarize CommandlineCount\
  \ = count() by bin(TimeGenerated, 1h), Process, CommandLine, Computer, Account\n\
  ) on Process, TimeGenerated\n| project AnomalyHour = TimeGenerated, Computer, Account,\
  \ Process, CommandLine, CommandlineCount, Total, baseline, anomalies, score\n| extend\
  \ timestamp = AnomalyHour, NTDomain = split(Account, '\\\\', 0)[0], Name = split(Account,\
  \ '\\\\', 1)[0], HostName = tostring(split(Computer, '.', 0)[0]), DnsDomain = tostring(strcat_array(array_slice(split(Computer,\
  \ '.'), 1, -1), '.'))\n"
query_frequency: P1D
query_period: P14D
severity: Medium
trigger_operator: GreaterThan
trigger_threshold: 0
