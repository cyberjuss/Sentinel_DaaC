description: "Encoding malicious software is a technique used to obfuscate files from\
  \ detection. \nThe first CommandLine component is looking for Python decoding base64.\
  \ \nThe second CommandLine component is looking for Bash/sh command line base64\
  \ decoding.\nThe third one is looking for Ruby decoding base64."
display_name: Process executed from binary hidden in Base64 encoded file
